<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKNOk.ai Studio - Suno + eMastered AI Music Tree Learning DAW</title>
    
    <!-- Complete SEO Meta Tags -->
    <meta name="description" content="UKNOk.ai - Complete AI Music Production Suite with Suno-style vocal generation, eMastered mastering, and Cubase DAW interface. Learn music production with AI.">
    <meta name="keywords" content="AI music generator, Suno AI, eMastered, music mastering, DAW, vocal AI, music production, MIDI editor, audio mixing">
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="UKNOk.ai Studio - AI Music Production Tree Learning">
    <meta property="og:description" content="Generate, master, and learn music production with Suno + eMastered AI technology">
    <meta property="og:image" content="https://uknok.ai/og-music-tree.jpg">
    <meta property="og:type" content="website">
    
    <!-- Schema.org MusicApplication -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "MusicApplication",
        "name": "UKNOk.ai Studio",
        "description": "AI-powered music production DAW",
        "applicationCategory": "MusicApplication",
        "featureList": ["AudioEditing", "MusicComposition", "MusicProduction"]
    }
    </script>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/indexeddbshim/1.0.0/indexeddb.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --gold: #FFD700;
            --red: #FF4444;
            --cyan: #4ECDC4;
            --dark1: #0a0a0a;
            --dark2: #1a1a2e;
            --dark3: #16213e;
            --panel: rgba(20, 20, 40, 0.97);
            --glow-gold: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark1), var(--dark2), var(--dark3));
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* === COMPLETE DAW LAYOUT === */
        .daw-container {
            display: grid;
            grid-template-areas: 
                "header header header"
                "tree transport editor"
                "database tracks mixer"
                "prompts console console";
            grid-template-rows: 70px 80px 1fr 220px;
            grid-template-columns: 320px 260px 1fr 480px;
            height: 100vh;
            gap: 2px;
        }

        /* HEADER - Suno + eMastered Branding */
        .header {
            grid-area: header;
            background: linear-gradient(90deg, 
                rgba(255,68,68,0.95) 0%, 
                rgba(255,215,0,0.9) 50%, 
                rgba(78,205,196,0.95) 100%);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .logo-main {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, white, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 40px;
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { text-shadow: var(--glow-gold); }
            50% { text-shadow: 0 0 40px rgba(255,215,0,1); }
        }

        /* LEARNING TREE PANEL */
        .learning-tree {
            grid-area: tree;
            background: linear-gradient(180deg, rgba(15,15,35,0.98), rgba(25,25,55,0.95));
            border-right: 3px solid var(--cyan);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tree-header {
            padding: 20px;
            background: rgba(78,205,196,0.2);
            border-bottom: 2px solid var(--cyan);
            text-align: center;
        }

        .tree-title {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .tree-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .tree-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--cyan);
            border-radius: 20px;
            color: var(--cyan);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .tree-btn:hover {
            background: var(--cyan);
            color: black;
            transform: scale(1.05);
        }

        .tree-nodes {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tree-node {
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border-left: 4px solid var(--cyan);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tree-node:hover {
            background: rgba(78,205,196,0.15);
            transform: translateX(5px);
            box-shadow: var(--glow-gold);
        }

        .node-title {
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .node-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* DATABASE PANEL */
        .database-panel {
            grid-area: database;
            background: linear-gradient(180deg, rgba(10,10,25,0.98), rgba(20,20,40,0.95));
            border-right: 3px solid var(--gold);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .db-header {
            padding: 20px;
            background: rgba(255,215,0,0.2);
            border-bottom: 2px solid var(--gold);
            text-align: center;
        }

        .db-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .db-item {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-right: 4px solid var(--gold);
        }

        .db-item:hover {
            background: rgba(255,215,0,0.1);
            transform: scale(1.02);
        }

        /* SUNO VOCAL PROMPT SYSTEM */
        .prompts-panel {
            grid-area: prompts;
            background: linear-gradient(135deg, 
                rgba(255,68,68,0.15), 
                rgba(255,215,0,0.1), 
                rgba(78,205,196,0.08));
            border-top: 3px solid var(--red);
            padding: 25px;
            overflow-y: auto;
        }

        .prompt-section {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 2px solid rgba(255,68,68,0.4);
        }

        .prompt-title {
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .suno-prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .prompt-field {
            position: relative;
        }

        .prompt-label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--dark2);
            padding: 0 8px;
            font-size: 0.75rem;
            color: var(--cyan);
            font-weight: 500;
        }

        .prompt-input {
            width: 100%;
            padding: 15px 12px 10px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(78,205,196,0.3);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .prompt-input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(78,205,196,0.3);
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--red), var(--gold));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(255,68,68,0.4);
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,68,68,0.6);
        }

        /* TRANSPORT */
        .transport {
            grid-area: transport;
            background: linear-gradient(180deg, rgba(25,25,55,0.98), rgba(15,15,35,0.95));
            border-bottom: 3px solid var(--cyan);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .transport-main {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .transport-btn {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            border: 3px solid var(--cyan);
            background: rgba(78,205,196,0.2);
            color: var(--cyan);
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .transport-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: white;
            animation: recordPulse 0.8s infinite;
        }

        @keyframes recordPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,68,68,0.8); }
            50% { box-shadow: 0 0 40px rgba(255,68,68,1); }
        }

        /* TRACKS & EDITOR */
        .tracks-panel {
            grid-area: tracks;
            background: linear-gradient(180deg, rgba(10,10,25,0.98), rgba(20,20,45,0.95));
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .editor {
            grid-area: editor;
            background: linear-gradient(135deg, rgba(15,15,35,0.98), rgba(25,25,55,0.95));
            overflow: hidden;
        }

        /* MASTER MIXER - eMastered Style */
        .master-mixer {
            grid-area: mixer;
            background: linear-gradient(135deg, 
                rgba(255,68,68,0.12), 
                rgba(255,215,0,0.08), 
                rgba(78,205,196,0.06));
            border-left: 4px solid var(--gold);
            padding: 25px;
            overflow-y: auto;
        }

        .master-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .master-title {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--gold), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .master-meter {
            height: 120px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), rgba(20,20,40,0.9));
            border-radius: 20px;
            position: relative;
            margin-bottom: 25px;
            border: 3px solid rgba(255,215,0,0.5);
            overflow: hidden;
        }

        .master-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, var(--red) 0%, var(--gold) 50%, var(--cyan) 100%);
            transition: height 0.1s ease;
            border-radius: 17px 17px 0 0;
            box-shadow: 0 0 30px currentColor;
        }

        /* CONSOLE */
        .console {
            grid-area: console;
            background: linear-gradient(180deg, rgba(5,5,15,0.98), rgba(15,15,35,0.95));
            border-top: 4px solid var(--red);
            padding: 25px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 12px 16px;
            margin-bottom: 10px;
            background: rgba(78,205,196,0.1);
            border-radius: 8px;
            border-left: 4px solid var(--cyan);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .daw-container {
                grid-template-columns: 280px 240px 1fr 400px;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.4);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--cyan), var(--gold));
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="daw-container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo-main">UKNOk.ai STUDIO</div>
            <div style="flex:1"></div>
            <i class="fas fa-brain" style="font-size:2rem; color:white; margin-right:20px"></i>
            <span style="font-weight:700; font-size:1.1rem">AI Learning Tree Active</span>
        </div>

        <!-- LEARNING TREE -->
        <div class="learning-tree">
            <div class="tree-header">
                <div class="tree-title">🎵 SUNO MUSIC TREE</div>
                <div class="tree-controls">
                    <button class="tree-btn" onclick="expandTree('genre')">Genres</button>
                    <button class="tree-btn" onclick="expandTree('style')">Styles</button>
                    <button class="tree-btn" onclick="expandTree('vocal')">Vocals</button>
                </div>
            </div>
            <div class="tree-nodes" id="treeNodes">
                <!-- Dynamic tree nodes -->
            </div>
        </div>

        <!-- DATABASE -->
        <div class="database-panel">
            <div class="db-header">
                <h3>💾 SOUND DATABASE</h3>
                <small>IndexedDB Storage</small>
            </div>
            <div class="db-list" id="soundDatabase">
                <!-- Dynamic database items -->
            </div>
        </div>

        <!-- TRANSPORT -->
        <div class="transport">
            <div class="transport-main">
                <button class="transport-btn" title="Stop"><i class="fas fa-stop"></i></button>
                <button class="transport-btn record active" title="Record" id="recordBtn"><i class="fas fa-circle"></i></button>
                <button class="transport-btn" title="Play" id="playBtn"><i class="fas fa-play"></i></button>
                <button class="transport-btn" title="Loop"><i class="fas fa-redo"></i></button>
            </div>
            <div style="font-family:'Roboto Mono'; font-size:1.2rem; color:var(--cyan);">
                01:23.456 | BPM: <span id="bpmDisplay">120</span>
            </div>
        </div>

        <!-- SUNO VOCAL PROMPTS -->
        <div class="prompts-panel">
            <div class="prompt-section">
                <h
