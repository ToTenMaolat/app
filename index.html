    <style>
        :root {
            /* Suno + eMastered Color Palette */
            --suno-red: #FF4757;
            --suno-gold: #FFA502;
            --suno-cyan: #2ED5FF;
            --suno-purple: #8B5CF6;
            --dark-void: #0A0A0F;
            --panel-dark: rgba(15, 15, 30, 0.98);
            --glass: rgba(255, 255, 255, 0.05);
            --glow-cyan: 0 0 25px rgba(46, 213, 255, 0.6);
            --glow-gold: 0 0 25px rgba(255, 165, 2, 0.6);
            --glow-red: 0 0 25px rgba(255, 71, 87, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at center, #0F0F23 0%, var(--dark-void) 70%);
            color: white;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, var(--suno-cyan), transparent),
                radial-gradient(2px 2px at 40px 70px, var(--suno-gold), transparent),
                radial-gradient(1px 1px at 90px 40px, var(--suno-red), transparent),
                radial-gradient(1px 1px at 130px 80px, var(--suno-purple), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            opacity: 0.1;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        /* === MAIN DAW SKIN === */
        .studio-skin {
            height: 100vh;
            display: grid;
            grid-template-areas: 
                "topbar topbar topbar"
                "sidebar main main"
                "sidebar mixer footer";
            grid-template-rows: 80px 1fr 220px;
            grid-template-columns: 380px 1fr 420px;
            gap: 2px;
            padding: 2px;
            background: linear-gradient(180deg, rgba(20,20,40,0.9), rgba(10,10,20,0.9));
            backdrop-filter: blur(20px);
        }

        /* TOPBAR - Suno Style Branding */
        .topbar {
            grid-area: topbar;
            background: linear-gradient(135deg, 
                var(--suno-red) 0%, 
                var(--suno-gold) 30%, 
                var(--suno-cyan) 70%, 
                var(--suno-purple) 100%);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: var(--glow-cyan);
            position: relative;
            overflow: hidden;
        }

        .topbar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.1) 30deg, transparent 60deg);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-hero {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, white 0%, var(--suno-gold) 50%, white 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: var(--glow-gold);
            margin-right: 60px;
            animation: brandPulse 2s ease-in-out infinite;
        }

        @keyframes brandPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(var(--glow-gold)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px var(--suno-gold)); }
        }

        .top-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-left: auto;
        }

        .top-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }

        .top-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .top-btn:hover::after { left: 100%; }
        .top-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--glow-cyan);
            border-color: var(--suno-cyan);
        }

        /* SIDEBAR - Learning Tree + Prompts */
        .sidebar {
            grid-area: sidebar;
            background: linear-gradient(180deg, 
                rgba(15,15,35,0.98) 0%, 
                rgba(25,25,55,0.95) 100%);
            border-right: 3px solid var(--suno-cyan);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tree-section {
            flex: 1;
            padding: 30px 25px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--suno-gold);
            margin-bottom: 25px;
            text-align: center;
            text-shadow: var(--glow-gold);
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--suno-cyan), var(--suno-gold));
            border-radius: 2px;
        }

        /* SUNO-STYLE PROMPT SYSTEM */
        .prompt-demo {
            background: linear-gradient(135deg, 
                rgba(255,71,87,0.15) 0%, 
                rgba(255,165,2,0.12) 50%, 
                rgba(46,213,255,0.1) 100%);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid rgba(255,71,87,0.4);
            margin-bottom: 30px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .prompt-input {
            position: relative;
            padding-top: 40px;
        }

        .prompt-label {
            position: absolute;
            top: 8px;
            left: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--suno-cyan);
            background: var(--panel-dark);
            padding: 2px 8px;
            border-radius: 10px;
            z-index: 2;
        }

        .prompt-field {
            width: 100%;
            padding: 16px 15px;
            background: rgba(0,0,0,0.7);
            border: 2px solid rgba(46,213,255,0.3);
            border-radius: 15px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .prompt-field:focus {
            outline: none;
            border-color: var(--suno-cyan);
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .demo-btn {
            grid-column: 1 / -1;
            padding: 20px;
            background: linear-gradient(135deg, var(--suno-red), var(--suno-gold));
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255,71,87,0.4);
        }

        .demo-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .demo-btn:hover::before { left: 100%; }
        .demo-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 60px rgba(255,71,87,0.6);
        }

        /* LEARNING TREE NODES */
        .tree-node {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }

        .tree-node::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--suno-cyan), var(--suno-gold), var(--suno-red));
        }

        .tree-node:hover {
            transform: translateX(10px) scale(1.02);
            box-shadow: var(--glow-cyan);
            border-color: var(--suno-cyan);
        }

        .node-icon {
            font-size: 1.5rem;
            margin-bottom: 12px;
            display: block;
        }

        .node-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: white;
        }

        .node-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        /* MAIN WORKSPACE */
        .main-workspace {
            grid-area: main;
            background: linear-gradient(135deg, 
                rgba(15,15,35,0.98), 
                rgba(25,25,55,0.95), 
                rgba(35,35,75,0.9));
            overflow: hidden;
            position: relative;
        }

        .piano-roll {
            height: 100%;
            position: relative;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 40px,
                rgba(46,213,255,0.08) 40px,
                rgba(46,213,255,0.08) 41px
            );
        }

        /* MIXER - eMastered Professional */
        .mixer {
            grid-area: mixer;
            background: linear-gradient(180deg,

ith Suno?\"},{\"answer\":\"No experience needed. Suno is built for everyone – people making music for the first time and chart-topping pros alike. Describe what you want in plain language: a genre, a mood, a topic, even a few lyrics. From there, you shape the melody, harmony, vocals, and production into exactly what you're hearing in your head.\",\"question\":\"Do I need any music experience to use Suno?\"},{\"answer\":\"Yes. With Suno's AI song generator, you can create complete, original songs just by describing what you want. Type a genre, a mood, an idea – \\\"chill lo-fi beat about rainy mornings\\\" – and Suno helps you build a full track with vocals, lyrics, and production in seconds. Millions of people are already using AI to make music: for fun, for content, for professional projects.\",\"question\":\"Can I use AI to make music?\"},{\"answer\":\"Yes. Suno is a free AI music generator that lets you create up to 10 songs a day, no credit card required.\\n\\nWhen you're ready to go further, paid plans unlock more. The Pro plan ($10/month) gives you 500 songs a month, royalty free music, access to v5.5 - Suno's best and most personalized AI music model – commercial use rights, priority generation, the Song Editor, stem separation into vocal and instrument stems, and audio uploads of up to 8 minutes. It's the go-to plan for content creators, songwriters, and anyone looking for royalty free music for YouTube, podcasts, ads, or any commercial project.\\n\\nThe Premier plan ($30/month) is built for serious creators and producers. On top of everything in Pro, you get 2,000 songs a month, access to Suno Studio – the first-ever generative audio workstation – a multitrack editor, MIDI export, persona voices, and early access to new features. It's a full AI music production suite in your browser.\\n\\nBoth paid plans are available at a 20% discount with annual billing.\",\"question\":\"Is Suno free to use?\"}],\"subtitle\":\"Everything you need to know about making musi
